networks:
  cdt-net:
    driver: bridge

volumes:
  pg_data:
  minio_data:
  mlflow_data:
  redis_data:
  airflow_db_data:

services:

  db:
    image: postgres:16-alpine
    container_name: cdt-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cdt}
      POSTGRES_USER: ${POSTGRES_USER:-cdt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdt_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init-timescale.sql:/docker-entrypoint-initdb.d/01-timescale.sql
    ports:
      - "5433:5432"
    networks: [cdt-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdt} -d ${POSTGRES_DB:-cdt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    container_name: cdt-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cdt_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cdt_secret_minio}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [cdt-net]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-05-03T04-25-36Z
    container_name: cdt-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-cdt_admin} ${MINIO_ROOT_PASSWORD:-cdt_secret_minio};
      mc mb --ignore-existing local/cdt-dicom;
      mc mb --ignore-existing local/cdt-ecg;
      mc mb --ignore-existing local/cdt-eam;
      mc mb --ignore-existing local/cdt-masks;
      mc mb --ignore-existing local/cdt-meshes;
      mc mb --ignore-existing local/mlflow-artifacts;
      echo 'Buckets OK';
      "
    networks: [cdt-net]

  redis:
    image: redis:7.2-alpine
    container_name: cdt-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-cdt_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [cdt-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cdt_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: cdt-mlflow
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER:-cdt}:${POSTGRES_PASSWORD:-cdt_secret}@db:5432/${POSTGRES_DB:-cdt}
      MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts/
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-cdt_admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-cdt_secret_minio}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-cdt}:${POSTGRES_PASSWORD:-cdt_secret}@db:5432/${POSTGRES_DB:-cdt}
      --artifacts-destination s3://mlflow-artifacts/
      --serve-artifacts
    ports:
      - "5001:5000"
    networks: [cdt-net]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cdt-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cdt}:${POSTGRES_PASSWORD:-cdt_secret}@db:5432/${POSTGRES_DB:-cdt}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cdt_redis}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-cdt_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-cdt_secret_minio}
      TWIN_ID_SEED: ${TWIN_ID_SEED:-CHANGE_ME_IN_PRODUCTION}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./reports/meshes_acdc/meshes:/app/data/meshes
      - ./reports/doe:/app/data/doe
      - ./models:/app/models
    networks: [cdt-net]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cdt-worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cdt}:${POSTGRES_PASSWORD:-cdt_secret}@db:5432/${POSTGRES_DB:-cdt}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cdt_redis}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-cdt_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-cdt_secret_minio}
      TWIN_ID_SEED: ${TWIN_ID_SEED:-CHANGE_ME_IN_PRODUCTION}
    volumes:
      - ./app:/app/app
    networks: [cdt-net]
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=4

  worker-reconstruction:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cdt-worker-reconstruction
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cdt}:${POSTGRES_PASSWORD:-cdt_secret}@db:5432/${POSTGRES_DB:-cdt}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cdt_redis}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-cdt_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-cdt_secret_minio}
      TWIN_ID_SEED: ${TWIN_ID_SEED:-CHANGE_ME_IN_PRODUCTION}
    volumes:
      - ./app:/app/app
    networks: [cdt-net]
    command: celery -A app.tasks.reconstruction worker --loglevel=info --concurrency=2 -Q reconstruction

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cdt-flower
    depends_on: [worker]
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-cdt_redis}@redis:6379/0
    ports:
      - "5555:5555"
    networks: [cdt-net]
    command: celery -A app.tasks.worker flower --port=5555

  # ── Apache Airflow 2.9 ────────────────────────
  airflow-db:
    image: postgres:16-alpine
    container_name: cdt-airflow-db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_secret
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks: [cdt-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: cdt-airflow-init
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__WEBSERVER__SECRET_KEY: 'cdt_airflow_secret_key'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: cdt_admin_2024
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    networks: [cdt-net]
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password cdt_admin_2024 --firstname CDT --lastname Admin --role Admin --email admin@cdt.local || true"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: cdt-airflow-webserver
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__WEBSERVER__SECRET_KEY: 'cdt_airflow_secret_key'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow
      NNUNET_CHECKPOINT_PATH: /opt/airflow/models/checkpoint_best.pth
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./app:/opt/airflow/app
      - ./models:/opt/airflow/models
    ports:
      - "8080:8080"
    networks: [cdt-net]
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: cdt-airflow-scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__WEBSERVER__SECRET_KEY: 'cdt_airflow_secret_key'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow
      NNUNET_CHECKPOINT_PATH: /opt/airflow/models/checkpoint_best.pth
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./app:/opt/airflow/app
      - ./models:/opt/airflow/models
    networks: [cdt-net]
    command: scheduler

  # ── CDT Solver (FEniCSx + openCARP) ──────────────
  solver:
    build:
      context: .
      dockerfile: docker/Dockerfile.solver
    container_name: cdt-solver
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://cdt:cdt_local_2024@db:5432/cdt
      REDIS_URL: redis://:cdt_redis_2024@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: cdt_admin
      MINIO_SECRET_KEY: cdt_minio_2024
    volumes:
      - ./app:/app/app
    ports:
      - "8001:8001"
    networks: [cdt-net]
    command: uvicorn app.solver_api:app --host 0.0.0.0 --port 8001 --reload
