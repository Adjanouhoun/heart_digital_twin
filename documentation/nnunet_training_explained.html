<text class="ts" x="360" y="228" text-anchor="middle">Compare pixel par pixel</text>

<line x1="460" y1="170" x2="520" y2="170" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#a3)"/>

</svg>
</div>

<div id="step-4" class="step-panel" style="display:none">
<svg width="100%" viewBox="0 0 680 300" role="img"><title>Backward pass and weight update</title><desc>Gradients flow back through network to update weights</desc>
<defs><marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="500" y="40" width="120" height="60" rx="10" fill="#E24B4A" fill-opacity="0.12" stroke="#E24B4A" stroke-width="1"/>

<text class="ts" x="560" y="85" text-anchor="middle">L'erreur</text>

<line x1="498" y1="70" x2="440" y2="70" stroke="#D85A30" stroke-width="1.5" marker-end="url(#a4)"/>
<text class="ts" x="468" y="60" text-anchor="middle" fill="#D85A30">Gradients</text>

<rect x="200" y="40" width="230" height="60" rx="12" fill="#534AB7" fill-opacity="0.1" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="315" y="67" text-anchor="middle" fill="#534AB7">R&eacute;seau U-Net</text>

<path d="M315 100 L315 140" stroke="#D85A30" stroke-width="1.5" marker-end="url(#a4)" fill="none"/>

<text class="ts" x="315" y="193" text-anchor="middle">poids = poids - lr &times; gradient</text>

</svg>
</div>
</div>

<script>
let currentStep = 0;
function showStep(n) {
  document.querySelectorAll('.step-panel').forEach((p, i) => {
    p.style.display = i === n ? 'block' : 'none';
  });
  document.querySelectorAll('#step-controls button').forEach((b, i) => {
    b.style.fontWeight = i === n ? '500' : '400';
    b.style.borderColor = i === n ? 'var(--color-border-primary)' : '';
  });
  currentStep = n;
}
showStep(0);
</script>
